<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Explorer - Contact</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <div class="nav-brand">🚀 Space Explorer</div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/solar-system">Solar System</a></li>
      <li><a href="/contact" class="active">Contact</a></li>
    </ul>
  </nav>

  <main>
    <section class="page-header">
      <h1>Contact Us</h1>
      <p>Have questions about space? Ask us!</p>
    </section>

    <section class="contact-section">
      <div class="contact-info">
        <h2>Get In Touch</h2>
        <p>📧 Email: hello@spaceexplorer.com</p>
        <p>🌍 Location: Earth, Milky Way Galaxy</p>
        <p>⏰ Response Time: Within 1 light-second</p>
      </div>

      <form class="contact-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" rows="5" placeholder="What's your space question?"></textarea>
        </div>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>Space Explorer &copy; 2024</p>
  </footer>
</body>
</html>
